name: "minimax_m2_5_oracle"
description: "Oracle architecture using MiniMax-M2.5 (local, H100x4) and video/document tools."

agent:
  model_key: "minimax_m2_5"
  prompt: "prompts/qwen_system_prompt_react.txt"

tools:
  - "search_documents"
  - "document_qa"
  - "video_qa_oracle"
  - "search_videos"

search_documents:
  embedding_model: "m3"

search_videos:
  embedding_model: "m3" # Options: m3, internvideo2
  embedding_source: "caption" # Options: video, caption

document_qa:
  model_key: "qwen3_vl"
  prompt: "prompts/tools/document_qa.txt"

video_qa:
  model_key: "llava_next_video"
  prompt: "prompts/tools/video_qa.txt"

video_qa_oracle:
  model_key: "qwen3_vl"
  prompt: "prompts/tools/video_qa_oracle.txt"

# ============================================
# GPU Services Configuration
# Agent runs on H100x4 node (separate from tools)
# ============================================
services:
  agent:
    enabled: true
    gpus: [0, 1, 2, 3]
    tensor_parallel_size: 4
    vllm_cfg:
      trust_remote_code: true
      enable_expert_parallel: true

  llava_next_video:
    enabled: false
  qwen3_vl:
    enabled: false
  internvideo2:
    enabled: false
  m3:
    gpus: []

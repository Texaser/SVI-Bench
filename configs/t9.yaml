# Default eval config for T9 (Cross-Corpus Agentic Reasoning). Override on
# the CLI (`svi-bench evaluate --task t9 --model X`) or by passing
# `config=` to `evaluate.run()`.
task: t9_cross_corpus_agentic_reasoning
archs: [gpt5]           # use "all" to run every entry in KNOWN_ARCHS
split: val              # one of: train, val, test, all
datasets: [basketball, hockey, soccer]
num_workers: 1
